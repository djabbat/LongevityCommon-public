# /etc/nginx/sites-available/hive.longevity.ge
#
# Reverse proxy for AIM Hive Queen.
# After installing: ln -s /etc/nginx/sites-available/hive.longevity.ge \
#                          /etc/nginx/sites-enabled/
# Then: certbot --nginx -d hive.longevity.ge && nginx -s reload

server {
    listen 80;
    listen [::]:80;
    server_name hive.longevity.ge;

    # Let certbot install HTTPS; redirect everything else.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hive.longevity.ge;

    # Certbot fills these in:
    # ssl_certificate /etc/letsencrypt/live/hive.longevity.ge/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/hive.longevity.ge/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Worker payloads are small but allow generous buffers anyway.
    client_max_body_size 1m;

    access_log /var/log/nginx/hive.longevity.ge.access.log;
    error_log  /var/log/nginx/hive.longevity.ge.error.log;

    # Health probe (no auth) — useful for uptime monitoring.
    location = /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
        proxy_set_header Host $host;
        access_log off;
    }

    # Worker traffic: contribute (POST) + updates (GET)
    location /v1/hive/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # Static landing page + assets are served by queen_app (it mounts
    # queen_deploy/web/ at root).
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
