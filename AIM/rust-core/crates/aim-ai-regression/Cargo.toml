[package]
name = "aim-ai-regression"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "AIM AI — regression detector (RD1). Diff the two most recent ledger rows; flag NEW critical findings. Rust port of AI/ai/regression_detector.py."

[dependencies]
aim-ai-ledger = { path = "../aim-ai-ledger" }
aim-ai-suppressions = { path = "../aim-ai-suppressions", optional = true }

serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
regex = "1"
once_cell = "1"

[features]
default = []
suppressions = ["dep:aim-ai-suppressions"]

[[bin]]
name = "aim-ai-regression"
path = "src/main.rs"

[dev-dependencies]
tempfile = "3"
