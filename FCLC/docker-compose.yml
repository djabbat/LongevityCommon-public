version: "3.9"

services:
  # ── PostgreSQL database ───────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fclc
      POSTGRES_PASSWORD: fclc
      POSTGRES_DB: fclc
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fclc"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── FCLC Orchestrator (Rust + Axum) ──────────────────────────────────────────
  fclc-server:
    build:
      context: .
      dockerfile: fclc-server/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://fclc:fclc@db:5432/fclc
      BIND_ADDR: "0.0.0.0:3000"
      FCLC_API_TOKEN: "${FCLC_API_TOKEN:-changeme-in-production}"
      RUST_LOG: "fclc_server=info,tower_http=warn"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── FCLC Web Dashboard (Elixir/Phoenix LiveView) ─────────────────────────────
  fclc-web:
    build:
      context: fclc-web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      fclc-server:
        condition: service_healthy
    environment:
      FCLC_SERVER_URL: "http://fclc-server:3000"
      FCLC_API_TOKEN: "${FCLC_API_TOKEN:-changeme-in-production}"
      PHX_HOST: "${PHX_HOST:-localhost}"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:-run-mix-phx.gen.secret-and-set-this}"
    ports:
      - "4000:4000"

volumes:
  pgdata:
    driver: local
