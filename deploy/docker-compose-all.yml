# LongevityCommon — full-stack docker compose (umbrella CONCEPT v5.6, 2026-04-28)
#
# Services aligned with current subproject layout:
#   - Ze:        ze-backend (Rust :4001)        + ze-web (Phoenix :4000)
#   - BioSense:  biosense-backend (Rust :4101)  + biosense-web (Phoenix :4100)
#   - Social:    server (Rust :8080) + web (nginx :80) + realtime (Phoenix :4500)
#   - Postgres:  social-layer DB (:5432)
#
# FCLC is intentionally NOT here — it lives in a separate repo (djabbat/FCLC)
# and is server-resident at /home/jaba/web/fclc/ via its own docker-compose.
#
# Old layout (./FCLC/backend, ./MCOA/backend, etc.) preserved in
# docker-compose-all.OLD-pre-v5.6.yml for diff history.
#
# Usage:
#   cd ~/Desktop/LongevityCommon
#   docker compose -f deploy/docker-compose-all.yml up -d --build
#
# Override secrets via .env (DATABASE_URL, SECRET_KEY_BASE, etc.).

x-common-env: &common-env
  LONGEVITYCOMMON_VERSION: "v5.6"
  RUST_LOG: "${RUST_LOG:-info}"

services:
  # ── Postgres for social layer ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lcommon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lcommon_dev}
      POSTGRES_DB: longevitycommon
    volumes:
      - lcommon_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lcommon -d longevitycommon"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Ze subproject ─────────────────────────────────────────────────────────
  # Server-mapped to 4400-4401 to avoid conflict with existing space-app on
  # 4000-4001. External access via ze.longevity.ge (nginx vhost).
  ze-backend:
    build:
      context: ../Ze
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
    ports:
      - "127.0.0.1:4401:4001"
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/4001"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ze-web removed from Docker 2026-05-04 — runs natively as
  # ze-web.service (see deploy/systemd/ze-web.service). The Phoenix
  # release lives in /opt/ze-web/. Backend (ze-backend) remains here.
  #
  # ze-web:
  #   build:
  #     context: ../Ze/ze-web
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   environment:
  #     <<: *common-env
  #     ZE_BACKEND_URL: "http://ze-backend:4001"
  #     SECRET_KEY_BASE: ${ZE_WEB_SECRET_KEY_BASE:?Missing ZE_WEB_SECRET_KEY_BASE — generate via mix phx.gen.secret}
  #     PHX_HOST: "${ZE_PHX_HOST:-ze.longevity.ge}"
  #   ports:
  #     - "127.0.0.1:4400:4000"
  #   depends_on:
  #     - ze-backend

  # ── BioSense subproject ───────────────────────────────────────────────────
  # Server-mapped to 4501-4502 to avoid conflict; external via biosense.longevity.ge.
  biosense-backend:
    build:
      context: ../BioSense
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
    ports:
      - "127.0.0.1:4502:4101"
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/4101"]
      interval: 10s
      timeout: 3s
      retries: 5

  # biosense-web removed from Docker 2026-05-04 — runs natively as
  # biosense-web.service (see deploy/systemd/biosense-web.service).
  # The Phoenix release lives in /opt/biosense-web/. Backend
  # (biosense-backend) remains here.
  #
  # biosense-web:
  #   build:
  #     context: ../BioSense/biosense-web
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   environment:
  #     <<: *common-env
  #     BIOSENSE_BACKEND_URL: "http://biosense-backend:4101"
  #     SECRET_KEY_BASE: ${BIOSENSE_WEB_SECRET_KEY_BASE:?Missing BIOSENSE_WEB_SECRET_KEY_BASE — generate via mix phx.gen.secret}
  #     PHX_HOST: "${BIOSENSE_PHX_HOST:-biosense.longevity.ge}"
  #   ports:
  #     - "127.0.0.1:4501:4100"
  #   depends_on:
  #     - biosense-backend

  # ── Social layer (umbrella) ───────────────────────────────────────────────
  # Server-mapped to 4600+ to avoid conflict with drjaba-app on 8080.
  # External via app.longevity.ge (nginx vhost).
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: "postgres://lcommon:${POSTGRES_PASSWORD:?Missing POSTGRES_PASSWORD}@postgres:5432/longevitycommon"
      BIOSENSE_API: "http://biosense-backend:4101"
      ZE_API: "http://ze-backend:4001"
    ports:
      - "127.0.0.1:4600:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ze-backend:
        condition: service_started
      biosense-backend:
        condition: service_started

  realtime:
    build:
      context: ../realtime
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: "ecto://lcommon:${POSTGRES_PASSWORD:?Missing POSTGRES_PASSWORD}@postgres:5432/longevitycommon"
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE:?Missing REALTIME_SECRET_KEY_BASE}
      PHX_HOST: "${REALTIME_PHX_HOST:-app.longevity.ge}"
    ports:
      - "127.0.0.1:4500:4500"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4700:80"
    depends_on:
      - server

volumes:
  lcommon_pg:
    driver: local
