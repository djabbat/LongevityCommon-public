version: "3.9"
services:
  fclc_backend:
    build: ./FCLC/backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://cn:cn@db:5432/fclc_db
      RUST_LOG: info
    depends_on: [db]
  fclc_frontend:
    build: ./FCLC/frontend
    ports:
      - "4001:4001"
    environment:
      BACKEND_URL: http://fclc_backend:3001
      PHX_HOST: localhost
      PHX_PORT: "4001"
    depends_on: [fclc_backend]
