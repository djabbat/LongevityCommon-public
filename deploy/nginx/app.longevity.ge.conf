###
# app.longevity.ge — LongevityCommon social platform front-end + API.
#
# Layout (Phase 4.6 finalisation, 2026-05-07):
#   /                  → static SPA from /var/www/longevitycommon-web/
#   /api/              → reverse-proxy to social-server (longevitycommon-server.service, :8080)
#   /realtime/socket   → reverse-proxy WS to realtime (longevitycommon-realtime.service, :4500)
#
# Older draft of this file proxied / to dev :4700 and /api/ to :4600;
# replaced by static-SPA + canonical port matrix from
# `~/Desktop/LongevityCommon/PARAMETERS.md § 8`.
#
# TLS via certbot. Loopback-only backends (HOST=127.0.0.1).
# Copy to /etc/nginx/sites-available/app.longevity.ge.conf and symlink
# into sites-enabled/.
###

server {
    listen 80;
    listen [::]:80;
    server_name app.longevity.ge;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.longevity.ge;

    ssl_certificate     /etc/letsencrypt/live/ze.longevity.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ze.longevity.ge/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Realtime websocket. Phoenix's default URL is /socket; we mount
    # under /realtime/socket so nginx routing is unambiguous.
    location /realtime/ {
        proxy_pass http://127.0.0.1:4500/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # REST API — social-server (Rust Axum)
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA static files; client-side routing fallback via try_files.
    location / {
        root /var/www/longevitycommon-web;
        try_files $uri $uri/ /index.html;
        # SPA assets are content-hashed → safe to cache aggressively.
        location ~* \.(js|css|woff2?|svg|png|webmanifest)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
